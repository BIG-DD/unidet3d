# 自定义分割标签配置
#
# annotation_id : 标注平台 title 字段中的编号，如 "2.汽车" → 2
# name_zh       : 中文标签名，与 JSON data[].label 字段严格匹配
# name_en       : 英文类别名，用于模型训练（CLASS_NAMES 顺序即为 label id 顺序）
# color_rgb     : 可视化颜色 [R, G, B]，取值范围 0-255
# size_prior_m  : [dx, dy, dz] 典型物体尺寸（米），用于深度覆盖不足时的尺寸兜底
#                 dx=横向, dy=竖向(向下为正), dz=深度方向
#                 不填则使用默认值 [1.0, 1.0, 1.0]

categories:
